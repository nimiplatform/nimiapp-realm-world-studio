app_id: nimi.realm-world-studio
display_name: Realm World Studio
profile: standalone
submission_role: developer-submitted-input
publish_readiness:
  install_command: pnpm install
  dev_renderer_command: pnpm dev:renderer
  dev_shell_command: pnpm dev:shell
  typecheck_command: pnpm typecheck
  lint_command: pnpm lint
  test_command: pnpm test
  spec_consistency_command: pnpm check:spec-consistency
  build_command: pnpm build
  validate_command: pnpm run validate
  local_audit_command: pnpm run local-audit
  pack_command: pnpm run pack
review_inputs:
  manifest: nimi.app.yaml
  build_profile: .nimi/admission/build-profile.yaml
  spec_authority_root: .nimi/spec/project/kernel
  spec_rule_catalog: .nimi/spec/project/kernel/tables/rule-catalog.yaml
  spec_index: .nimi/spec/INDEX.md
admission_truth: platform-owned-after-review
