build_profile_ref: tauri-pnpm-vite
toolchain_version: node>=24;pnpm>=10;rust>=1.80;tauri=2
install_command: pnpm install
typecheck_command: pnpm typecheck
lint_command: pnpm lint
test_command: pnpm test
build_command: pnpm build
build_renderer_command: pnpm build:renderer
shell_check_command: cargo check --manifest-path src-tauri/Cargo.toml
output_path: src-tauri/target/release
renderer_output_path: dist
lockfile_path: pnpm-lock.yaml
lockfile_policy: author-install-generates-lockfile
ci_install_command: pnpm install --no-frozen-lockfile
profile_role: developer-workflow-input
